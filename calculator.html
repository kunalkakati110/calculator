<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #141e30, #243b55);
        }

        .calculator {
            width: 320px;
            background-color: #0f172a;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .display {
            background-color: #1e293b;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            word-wrap: break-word;
            word-break: break-all;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .previous-operand {
            color: #94a3b8;
            font-size: 1.1rem;
            min-height: 24px;
        }

        .current-operand {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 600;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            cursor: pointer;
            font-size: 1.4rem;
            font-weight: 500;
            border: none;
            outline: none;
            border-radius: 16px;
            background-color: #334155;
            color: #ffffff;
            transition: all 0.1s ease;
            aspect-ratio: 1;
        }

        button:active {
            transform: scale(0.95);
            filter: brightness(1.2);
        }

        button.span-two {
            grid-column: span 2;
            aspect-ratio: auto;
            height: 100%;
        }

        button.operator {
            background-color: #f97316;
            color: #ffffff;
        }

        button.operator:active {
            background-color: #ea580c;
        }

        button.control {
            background-color: #64748b;
        }

        button.control:active {
            background-color: #475569;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display">
            <div id="previous-operand" class="previous-operand"></div>
            <div id="current-operand" class="current-operand">0</div>
        </div>
        <div class="buttons">
            <button onclick="clearDisplay()" class="span-two control">AC</button>
            <button onclick="deleteNumber()" class="control">DEL</button>
            <button onclick="chooseOperator('÷')" class="operator">÷</button>
            
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button onclick="chooseOperator('×')" class="operator">×</button>
            
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button onclick="chooseOperator('-')" class="operator">−</button>
            
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button onclick="chooseOperator('+')" class="operator">+</button>
            
            <button onclick="appendNumber('0')" class="span-two">0</button>
            <button onclick="appendNumber('.')">.</button>
            <button onclick="compute()" class="operator">=</button>
        </div>
    </div>

    <script>
        const previousOperandText = document.getElementById('previous-operand');
        const currentOperandText = document.getElementById('current-operand');

        let currentOperand = '0';
        let previousOperand = '';
        let operation = undefined;

        function clearDisplay() {
            currentOperand = '0';
            previousOperand = '';
            operation = undefined;
            updateDisplay();
        }

        function deleteNumber() {
            if (currentOperand === '0') return;
            if (currentOperand.length === 1) {
                currentOperand = '0';
            } else {
                currentOperand = currentOperand.slice(0, -1);
            }
            updateDisplay();
        }

        function appendNumber(number) {
            if (number === '.' && currentOperand.includes('.')) return;
            if (currentOperand === '0' && number !== '.') {
                currentOperand = number.toString();
            } else {
                currentOperand = currentOperand.toString() + number.toString();
            }
            updateDisplay();
        }

        function chooseOperator(selectedOperation) {
            if (currentOperand === '') return;
            if (previousOperand !== '') {
                compute();
            }
            operation = selectedOperation;
            previousOperand = currentOperand;
            currentOperand = '';
            updateDisplay();
        }

        function compute() {
            let computation;
            const prev = parseFloat(previousOperand);
            const current = parseFloat(currentOperand);
            if (isNaN(prev) || isNaN(current)) return;

            switch (operation) {
                case '+':
                    computation = prev + current;
                    break;
                case '-':
                    computation = prev - current;
                    break;
                case '×':
                    computation = prev * current;
                    break;
                case '÷':
                    if (current === 0) {
                        alert("Cannot divide by zero");
                        clearDisplay();
                        return;
                    }
                    computation = prev / current;
                    break;
                default:
                    return;
            }

            currentOperand = computation.toString();
            operation = undefined;
            previousOperand = '';
            updateDisplay();
        }

        function updateDisplay() {
            currentOperandText.innerText = currentOperand;
            if (operation != null) {
                previousOperandText.innerText = `${previousOperand} ${operation}`;
            } else {
                previousOperandText.innerText = '';
            }
        }

        window.addEventListener('keydown', e => {
            if ((e.key >= '0' && e.key <= '9') || e.key === '.') appendNumber(e.key);
            if (e.key === '=' || e.key === 'Enter') compute();
            if (e.key === 'Backspace') deleteNumber();
            if (e.key === 'Escape') clearDisplay();
            if (e.key === '+') chooseOperator('+');
            if (e.key === '-') chooseOperator('-');
            if (e.key === '*') chooseOperator('×');
            if (e.key === '/') {
                e.preventDefault();
                chooseOperator('÷');
            }
        });
    </script>
</body>
</html>
